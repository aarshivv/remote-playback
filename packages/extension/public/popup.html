<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 220px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a1a;
    }

    h3 {
      font-size: 14px;
      color: #fff;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .row.bordered {
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 12px; }

    select {
      width: 100%;
      padding: 6px 8px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #c00; }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #c00; }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: #c00;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #a00; }
    button:disabled { background: #444; cursor: default; }

    .note {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h3>RemotePlayback</h3>

  <div class="row bordered">
    <span>TV Mode</span>
    <label class="switch">
      <input type="checkbox" id="enabledToggle">
      <span class="slider"></span>
    </label>
  </div>

  <label for="resolution">Resolution</label>
  <select id="resolution">
    <option value="720p">720p (HD)</option>
    <option value="1080p">1080p (Full HD)</option>
    <option value="1440p">1440p (2K)</option>
    <option value="4k">4K (Ultra HD)</option>
  </select>

  <button id="fullscreenBtn">Go Fullscreen</button>

  <p class="note">Reload the YouTube TV tab for full effect.</p>

  <script src="popup.js"></script>
</body>
</html>
