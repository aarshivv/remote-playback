name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Zip extension
        run: cd packages/extension/dist && zip -r "$GITHUB_WORKSPACE/remote-playback-${GITHUB_REF_NAME}.zip" .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "remote-playback-${GITHUB_REF_NAME}.zip" --generate-notes
